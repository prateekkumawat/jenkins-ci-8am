<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenkins Learning Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    background: #333;
    padding: 15px 40px;
    color: white;
}

.navbar h2 {
    color: #fff;
}

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    cursor: pointer;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    padding: 30px;
}

/* TABS */
.tab {
    display: none;
}

.active {
    display: block;
}

/* COURSES */
.course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.course-card {
    background: #f4f4f4;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

button {
    padding: 10px 20px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* LOGIN */
.login-box {
    max-width: 400px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* DASHBOARD */
.dashboard {
    text-align: center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>DevOps Learning Hub</h2>
    <div class="nav-links">
        <a onclick="showTab('home')">Home</a>
        <a onclick="showTab('courses')">Courses</a>
        <a onclick="showTab('login')">Login</a>
        <a onclick="showTab('dashboard')">Dashboard</a>
    </div>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="tab active">
    <h1>Welcome Prateek 🚀</h1>
    <p>Master Jenkins, AWS, Azure & DevOps pipelines.</p>
</div>

<!-- COURSES -->
<div id="courses" class="tab">
    <h2>Available Courses</h2>
    <div class="course-grid">
        <div class="course-card">
            <h3>Jenkins Basics</h3>
            <button>Enroll</button>
        </div>
        <div class="course-card">
            <h3>AWS DevOps</h3>
            <button>Enroll</button>
        </div>
        <div class="course-card">
            <h3>Azure DevOps</h3>
            <button>Enroll</button>
        </div>
        <div class="course-card">
            <h3>Kubernetes CI/CD</h3>
            <button>Enroll</button>
        </div>
    </div>
</div>

<!-- LOGIN -->
<div id="login" class="tab">
    <h2>Login</h2>
    <div class="login-box">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <hr>

        <button onclick="awsLogin()">Login with AWS</button>
        <button onclick="azureLogin()">Login with Azure</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
    <div class="dashboard">
        <h2>User Dashboard</h2>
        <p id="userStatus">Not logged in</p>
    </div>
</div>

</div>

<script>
function showTab(tabId) {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
    });
    document.getElementById(tabId).classList.add('active');
}

function login() {
    document.getElementById("userStatus").innerText = "Logged in (Basic)";
    showTab('dashboard');
}

function awsLogin() {
    document.getElementById("userStatus").innerText = "Logged in via AWS";
    showTab('dashboard');
}

function azureLogin() {
    document.getElementById("userStatus").innerText = "Logged in via Azure";
    showTab('dashboard');
}
</script>

</body>
</html>
